<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Color Changer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 220px;
      padding: 20px;
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      text-align: center;
    }

    h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 16px;
    }

    #colorPreview {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin: 0 auto 16px;
      background: #333;
      border: 3px solid #222;
      transition: background 0.4s ease;
    }

    #colorHex {
      font-size: 13px;
      color: #666;
      margin-bottom: 20px;
      font-family: monospace;
      letter-spacing: 0.05em;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.85; }

    #btnRandom {
      background: linear-gradient(135deg, #e040fb, #7c4dff);
      color: #fff;
      margin-bottom: 8px;
    }

    #btnReset {
      background: #222;
      color: #888;
    }
  </style>
</head>
<body>
  <h1>🎨 Color Changer</h1>
  <div id="colorPreview"></div>
  <div id="colorHex">#------</div>
  <button id="btnRandom">Color aleatorio</button>
  <button id="btnReset">Restaurar original</button>

  <script src="content.js"></script>
</body>
</html>
